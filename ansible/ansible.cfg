[ssh_connection]
control_path = ~/.ansible/cp/ansible-ssh-%%h-%%p-%%r
# 🔄 FIX: Changed from \$SSH_KEY_FILE to $SSH_KEY_FILE (removed the backslash)
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=6 -o ProxyCommand="ssh -i $SSH_KEY_FILE -o StrictHostKeyChecking=no -W %h:%p ec2-user@{{ bastion_ip }}"

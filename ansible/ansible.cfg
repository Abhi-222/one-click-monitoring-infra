[defaults]
roles_path = ./roles
inventory = inventory/aws_ec2.yml
host_key_checking = False
retry_files_enabled = False
# stdout_callback = yaml
deprecation_warnings = False


# [ssh_connection]
# ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=6
# control_path = ~/.ansible/cp/ansible-ssh-%%h-%%p-%%r

[ssh_connection]
control_path = ~/.ansible/cp/ansible-ssh-%%h-%%p-%%r
# 🌟 Clean, Dynamic ProxyJump with zero hardcoding and zero character escaping bugs!
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=6 {% if inventory_hostname != bastion_ip %}-o ProxyJump=ec2-user@{{ bastion_ip }}{% endif %}

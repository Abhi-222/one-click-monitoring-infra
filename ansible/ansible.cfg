[defaults]
roles_path = ./roles
inventory = inventory/aws_ec2.yml
host_key_checking = False
retry_files_enabled = False
# stdout_callback = yaml
deprecation_warnings = False
# 🛠️ Fix 1: Force Ansible to use ec2-user for all Amazon Linux nodes
remote_user = ec2-user

[ssh_connection]
control_path = ~/.ansible/cp/ansible-ssh-%%h-%%p-%%r
# 🛠️ Fix 2: Dynamically read the secret file path from the environment
# 🛠️ Fix 3: Target only private IPs (10.*) for the proxy tunnel, leaving the Bastion unblocked
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=6

[ssh_connection:10.*]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyCommand="ssh -i $SSH_KEY_FILE -o StrictHostKeyChecking=no -W %h:%p ec2-user@{{ bastion_ip }}"
